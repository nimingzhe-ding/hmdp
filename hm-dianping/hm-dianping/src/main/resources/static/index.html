<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>标记生活 - 发现美好生活</title>
  <!-- CSS modules -->
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/feed.css">
  <link rel="stylesheet" href="/assets/css/detail.css">
  <link rel="stylesheet" href="/assets/css/mall.css">
  <link rel="stylesheet" href="/assets/css/video.css">
  <link rel="stylesheet" href="/assets/css/dialogs.css">
  <link rel="stylesheet" href="/assets/css/search.css">
  <link rel="stylesheet" href="/assets/css/mobile.css">
</head>
<body>
  <div class="app-shell">
    <!-- 顶部主导航：品牌、搜索、登录发布入口 -->
    <header class="topbar">
      <div class="brand-group">
        <a class="brand" href="/" aria-label="标记生活首页">
          <span class="brand-name">标记生活</span>
        </a>
        <span class="brand-tagline">标记你的生活</span>
      </div>

      <form class="search-box" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Zm5.1.6 3.2 3.2-1.4 1.4-3.2-3.2 1.4-1.4Z"/>
        </svg>
        <input id="searchInput" type="search" autocomplete="off" placeholder="搜索笔记、探店、好物">
        <button type="submit">搜索</button>
        <div class="suggest-popover" id="suggestPopover"></div>
        <div class="trend-list" id="trendList" hidden></div>
      </form>

      <div class="account-actions">
        <button class="ghost-button notification-button" id="openNotifications" type="button">
          消息<span id="notificationBadge" hidden>0</span>
        </button>
        <button class="ghost-button" id="loginButton" type="button">登录</button>
        <button class="publish-button" id="openComposer" type="button">发布</button>
      </div>
    </header>

    <!-- 二级频道导航 -->
    <nav class="feed-tabs" aria-label="内容频道">
      <button class="tab is-active" data-feed="hot">发现</button>
      <button class="tab" data-feed="follow">关注</button>
      <button class="tab" data-feed="nearby">附近</button>
      <button class="tab" id="videoTab" type="button">视频</button>
      <button class="tab" id="mallTab" type="button">商城</button>
    </nav>

    <main class="main-layout">
      <!-- 中央内容区：频道筛选、AI 搜索推荐、瀑布流笔记 -->
      <section class="content-area" aria-label="笔记内容流">
        <div class="topic-strip" id="categoryList">
          <button class="category-pill is-active" data-category="">推荐</button>
          <button class="category-pill" data-category="fashion">穿搭</button>
          <button class="category-pill" data-category="beauty">美妆</button>
          <button class="category-pill" data-category="travel">旅行</button>
          <button class="category-pill" data-category="home">家居</button>
          <button class="category-pill" data-category="food">美食</button>
          <button class="category-pill" data-category="explore">探店</button>
          <button class="category-pill" data-category="trend">潮玩</button>
          <button class="category-pill" data-category="sport">运动</button>
          <button class="category-pill" data-category="reading">读书</button>
        </div>
        <div class="status-banner" id="statusBanner" hidden></div>
        <section class="unified-search" id="unifiedSearch" hidden>
          <div class="unified-search-head">
            <div>
              <strong id="unifiedSearchTitle">搜索结果</strong>
              <span id="unifiedSearchSummary"></span>
            </div>
          </div>
          <div class="unified-tabs" id="unifiedSearchTabs"></div>
          <div class="unified-results" id="unifiedSearchResults"></div>
        </section>
        <section class="profile-home" id="profileHome" hidden>
          <div class="profile-hero">
            <img id="profileHomeAvatar" alt="">
            <div>
              <strong id="profileHomeName">探店用户</strong>
              <span id="profileHomeIntro">这个人还没有写简介。</span>
              <small id="profileHomeMeta"></small>
              <div class="creator-growth" id="profileGrowth"></div>
            </div>
            <button class="soft-button" id="editProfileButton" type="button">编辑资料</button>
          </div>
          <div class="profile-home-stats">
            <button type="button" data-profile-tab="works"><strong id="profileHomeWorks">0</strong><span>作品</span></button>
            <button type="button" data-profile-tab="collections"><strong id="profileHomeCollections">0</strong><span>收藏</span></button>
            <button type="button" data-profile-tab="liked"><strong id="profileHomeLiked">0</strong><span>点赞</span></button>
            <button type="button" data-profile-tab="following"><strong id="profileHomeFollowing">0</strong><span>关注</span></button>
            <button type="button" data-profile-tab="followers"><strong id="profileHomeFollowers">0</strong><span>粉丝</span></button>
          </div>
          <div class="profile-home-tabs" id="profileHomeTabs"></div>
          <div class="profile-home-results" id="profileHomeResults"></div>
        </section>
        <div class="discover-strip" id="discoverStrip">
          <button class="discover-card" data-category="fashion">
            <span class="discover-icon">👗</span>
            <span class="discover-label">穿搭灵感</span>
          </button>
          <button class="discover-card" data-category="beauty">
            <span class="discover-icon">💄</span>
            <span class="discover-label">美妆护肤</span>
          </button>
          <button class="discover-card" data-category="travel">
            <span class="discover-icon">✈️</span>
            <span class="discover-label">旅行攻略</span>
          </button>
          <button class="discover-card" data-category="home">
            <span class="discover-icon">🏠</span>
            <span class="discover-label">家居好物</span>
          </button>
          <button class="discover-card" data-category="food">
            <span class="discover-icon">🍜</span>
            <span class="discover-label">美食探店</span>
          </button>
          <button class="discover-card" data-category="trend">
            <span class="discover-icon">🎨</span>
            <span class="discover-label">潮流玩具</span>
          </button>
        </div>
        <div class="masonry-feed" id="noteFeed" aria-live="polite"></div>
        <div class="feed-loading" id="feedLoading">正在加载更多笔记...</div>
      </section>

      <section class="video-area" id="videoArea" aria-label="视频流" hidden>
        <div class="video-feed" id="videoFeed"></div>
      </section>

      <section class="mall-area" id="mallArea" aria-label="商城" hidden>
        <div class="mall-head">
          <div>
            <strong>好物商城</strong>
            <span>发现生活好物，探索品质消费</span>
          </div>
          <div class="mall-actions">
            <button class="soft-button" id="openMerchantCenter" type="button">商家中心</button>
            <button class="soft-button" id="openCart" type="button">购物车</button>
            <button class="soft-button" id="openOrders" type="button">我的订单</button>
          </div>
        </div>
        <div class="mall-tabs">
          <button class="category-pill is-active" data-mall-category="all">推荐</button>
          <button class="category-pill" data-mall-category="food">精选美食</button>
          <button class="category-pill" data-mall-category="beauty">美妆个护</button>
          <button class="category-pill" data-mall-category="home">家居生活</button>
          <button class="category-pill" data-mall-category="fashion">潮流装备</button>
          <button class="category-pill" data-mall-category="travel">旅行出行</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </section>

    </main>

    <!-- 移动端底部主导航 -->
    <nav class="mobile-tabbar" aria-label="移动端导航">
      <button class="is-active" type="button" id="mobileHome" data-feed="hot" data-mobile-tab="home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2 3.4 10v10h6v-6h5.2v6h6V10L12 3.2Z"/></svg>
        <span>首页</span>
      </button>
      <button type="button" id="mobileMall" data-mobile-tab="mall">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12l-1 13H7L6 7Zm3-2a3 3 0 0 1 6 0h-2a1 1 0 0 0-2 0H9Z"/></svg>
        <span>商城</span>
      </button>
      <button type="button" id="mobilePublish" class="mobile-publish-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="#ff2442"/><path d="M11 7h2v10h-2zM7 11h10v2H7z" fill="#fff"/></svg>
      </button>
      <button type="button" id="mobileNotifications" data-mobile-tab="messages">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span>消息</span>
      </button>
      <button type="button" id="mobileProfile" data-mobile-tab="profile">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>我</span>
      </button>
    </nav>
    <button class="customer-service-fab" id="openCustomerService" type="button">客服</button>
  </div>

  <!-- 笔记详情层：图片浏览、正文、评论和互动操作 -->
  <div class="detail-drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-backdrop" data-close-drawer></div>
    <article class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
      <button class="icon-button drawer-close" type="button" data-close-drawer aria-label="关闭详情">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
      </button>
      <div class="drawer-media">
        <div class="image-stage" id="drawerMedia"></div>
        <div class="thumb-row" id="drawerThumbs"></div>
      </div>
      <div class="drawer-body">
        <div class="author-row">
          <img id="drawerAvatar" alt="">
          <div>
            <strong id="drawerAuthor"></strong>
            <span id="drawerTime"></span>
            <div class="creator-growth" id="drawerAuthorGrowth"></div>
          </div>
          <button class="follow-button" id="drawerFollow" type="button">关注</button>
        </div>
        <h1 id="drawerTitle"></h1>
        <div class="drawer-content" id="drawerContent"></div>
        <section class="shop-bridge" id="shopBridge" hidden>
          <div class="shop-main">
            <img id="shopImage" alt="">
            <div>
              <strong id="shopName"></strong>
              <span id="shopMeta"></span>
              <small id="shopAddress"></small>
            </div>
          </div>
          <div class="shop-offer" id="shopOffer" hidden>
            <div>
              <strong id="voucherTitle"></strong>
              <span id="voucherSubTitle"></span>
            </div>
            <button type="button" id="voucherAction">去看看</button>
          </div>
        </section>
        <section class="note-products" id="noteProductBridge" hidden>
          <div class="section-title">
            <strong>内容同款</strong>
            <span id="noteProductCount">0</span>
          </div>
          <div class="note-product-list" id="noteProductList"></div>
        </section>
        <section class="note-smart" id="noteSmart" hidden>
          <strong>智能看点</strong>
          <p id="noteSmartText"></p>
        </section>
        <section class="note-related" id="noteRelated" hidden>
          <div class="section-title">
            <strong>相关推荐</strong>
            <span>继续发现</span>
          </div>
          <div class="related-list" id="noteRelatedList"></div>
        </section>
        <section class="comment-section">
          <div class="section-title">
            <strong>评论</strong>
            <span id="commentCount">0</span>
          </div>
          <div class="comment-sort">
            <button type="button" class="is-active" data-comment-sort="hot">热门</button>
            <button type="button" data-comment-sort="new">最新</button>
            <button type="button" data-comment-sort="old">最早</button>
          </div>
          <div class="comment-list" id="commentList"></div>
        </section>
        <div class="drawer-actions">
          <form class="comment-form" id="commentForm">
            <input id="commentInput" placeholder="说点什么...">
            <button type="submit">发送</button>
          </form>
          <button type="button" id="drawerLike">喜欢</button>
          <button type="button" id="drawerCollect">收藏</button>
          <button type="button" id="drawerAnalyze">总结</button>
          <button type="button" id="drawerEdit" hidden>编辑</button>
          <button type="button" id="drawerDelete" hidden>删除</button>
        </div>
      </div>
    </article>
  </div>

  <!-- 发布弹窗：图片上传 + 图文笔记表单 -->
  <dialog class="shop-dialog" id="shopDialog">
    <div class="shop-dialog-panel">
      <div class="dialog-head">
        <h2 id="shopDialogName">店铺详情</h2>
        <button class="icon-button" id="closeShopDialog" type="button" aria-label="关闭店铺详情">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="shop-dialog-hero">
        <img id="shopDialogImage" alt="">
        <div>
          <strong id="shopDialogMeta"></strong>
          <span id="shopDialogAddress"></span>
          <small id="shopDialogHours"></small>
        </div>
      </div>
      <div class="voucher-list" id="voucherList"></div>
    </div>
  </dialog>

  <dialog class="shop-dialog" id="productDialog">
    <div class="shop-dialog-panel">
      <div class="dialog-head">
        <h2 id="productDialogTitle">商品详情</h2>
        <button class="icon-button" id="closeProductDialog" type="button" aria-label="关闭商品详情">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <img class="product-dialog-image" id="productDialogImage" alt="">
      <p id="productDialogSub"></p>
      <div class="product-dialog-price">
        <strong id="productDialogPrice"></strong>
        <span id="productDialogStock"></span>
      </div>
      <div class="voucher-list mall-voucher-list" id="mallVoucherList"></div>
      <div class="dialog-actions">
        <button class="ghost-button" id="addProductCart" type="button">加入购物车</button>
        <button class="publish-button" id="buyProductNow" type="button">立即购买</button>
      </div>
    </div>
  </dialog>

  <dialog class="shop-dialog checkout-dialog" id="checkoutDialog">
    <div class="shop-dialog-panel checkout-panel">
      <div class="dialog-head">
        <h2>确认订单</h2>
        <button class="icon-button" id="closeCheckoutDialog" type="button" aria-label="关闭确认订单">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="checkout-body" id="checkoutBody"></div>
    </div>
  </dialog>

  <dialog class="shop-dialog" id="cartDialog">
    <div class="shop-dialog-panel">
      <div class="dialog-head">
        <h2 id="cartDialogTitle">购物车</h2>
        <button class="icon-button" id="closeCartDialog" type="button" aria-label="关闭购物车">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="voucher-list" id="cartList"></div>
    </div>
  </dialog>

  <dialog class="shop-dialog" id="notificationDialog">
    <div class="shop-dialog-panel">
      <div class="dialog-head">
        <h2>消息通知</h2>
        <button class="icon-button" id="closeNotificationDialog" type="button" aria-label="关闭消息通知">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="notification-actions">
        <div class="notification-tabs">
          <button class="notification-tab is-active" data-filter="all" type="button">全部</button>
          <button class="notification-tab" data-filter="unread" type="button">未读</button>
        </div>
        <button class="soft-button" id="markNotificationsRead" type="button">全部已读</button>
      </div>
      <div class="notification-list" id="notificationList"></div>
    </div>
  </dialog>

  <dialog class="shop-dialog customer-service-dialog" id="customerServiceDialog">
    <div class="shop-dialog-panel customer-service-panel">
      <div class="dialog-head">
        <h2>智能客服</h2>
        <button class="icon-button" id="closeCustomerService" type="button" aria-label="关闭智能客服">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="customer-service-messages" id="customerServiceMessages"></div>
      <div class="customer-service-quick">
        <button type="button" data-cs-question="怎么申请退款？">退款</button>
        <button type="button" data-cs-question="怎么查看物流？">物流</button>
        <button type="button" data-cs-question="优惠券怎么用？">优惠券</button>
      </div>
      <form class="customer-service-form" id="customerServiceForm">
        <input id="customerServiceInput" placeholder="问订单、退款、物流、优惠券问题">
        <button class="publish-button" type="submit">发送</button>
      </form>
    </div>
  </dialog>

  <!-- 发布弹窗：图片上传 + 图文笔记表单 -->
  <dialog class="shop-dialog merchant-dialog" id="merchantDialog">
    <div class="shop-dialog-panel">
      <div class="dialog-head">
        <h2 id="merchantDialogTitle">商家中心</h2>
        <button class="icon-button" id="closeMerchantDialog" type="button" aria-label="关闭商家中心">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="merchant-panel" id="merchantPanel"></div>
    </div>
  </dialog>

  <dialog class="composer-dialog" id="composerDialog">
    <form method="dialog" class="composer-form" id="composerForm">
      <div class="dialog-head">
        <h2>发布内容</h2>
        <button class="icon-button" value="cancel" aria-label="关闭发布弹窗">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <div class="composer-type-tabs" role="radiogroup" aria-label="内容类型">
        <label>
          <input type="radio" name="contentType" value="IMAGE" checked>
          <span>图文</span>
        </label>
        <label>
          <input type="radio" name="contentType" value="VIDEO">
          <span>视频</span>
        </label>
        <label>
          <input type="radio" name="contentType" value="PRODUCT_NOTE">
          <span>商品种草</span>
        </label>
        <label>
          <input type="radio" name="contentType" value="LIVE">
          <span>直播预告</span>
        </label>
      </div>
      <div class="composer-draft-bar" id="composerDraftBar" hidden>
        <span id="composerDraftText">草稿已自动保存</span>
        <button type="button" id="clearComposerDraft">清空草稿</button>
      </div>
      <label class="upload-box" for="imageFiles" data-content-field="image">
        <input id="imageFiles" name="files" type="file" accept="image/*" multiple>
        <span>上传图片</span>
        <small>支持多张图片，发布前会自动上传</small>
      </label>
      <div class="preview-grid" id="uploadPreview"></div>
      <label class="upload-box video-upload-box" for="videoFile" data-content-field="video">
        <input id="videoFile" name="videoFile" type="file" accept="video/mp4,video/webm,video/quicktime">
        <span>上传视频</span>
        <small data-video-upload-tip>支持 MP4/WebM/MOV，发布前会自动上传</small>
      </label>
      <div class="video-preview" id="videoPreview" data-content-field="video"></div>
      <label>
        标题
        <input name="title" maxlength="80" required placeholder="比如：人均 30 的宝藏茶餐厅">
      </label>
      <label>
        图片地址
        <input name="images" placeholder="/imgs/blogs/blog1.jpg，多个地址用英文逗号分隔">
      </label>
      <label data-content-field="video">
        视频/直播地址
        <input name="videoUrl" placeholder="MP4 或直播回放地址">
      </label>
      <label data-content-field="shop">
        关联店铺 ID
        <input name="shopId" type="number" min="1" placeholder="关联店铺，选填">
      </label>
      <label>
        挂载商品 ID
        <input name="productIds" placeholder="多个商品 ID 用英文逗号分隔，商品种草必填">
      </label>
      <label>
        话题标签
        <select name="tags">
          <option value="探店">探店</option>
          <option value="美食">美食</option>
          <option value="穿搭">穿搭</option>
          <option value="旅行">旅行</option>
          <option value="数码">数码</option>
          <option value="好物">好物</option>
        </select>
        <input name="topics" maxlength="80" placeholder="如：#周末去哪儿 #人均50 #约会餐厅">
      </label>
      <label>
        正文
        <textarea name="content" rows="7" required placeholder="分享环境、菜品、价格、路线和适合的人群"></textarea>
      </label>
      <div class="dialog-actions">
        <button class="ghost-button" value="cancel">取消</button>
        <button class="publish-button" value="default">发布</button>
      </div>
    </form>
  </dialog>

  <dialog class="shop-dialog" id="profileEditDialog">
    <form method="dialog" class="login-form" id="profileEditForm">
      <div class="dialog-head">
        <h2>编辑个人资料</h2>
        <button class="icon-button" value="cancel" aria-label="关闭资料编辑">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <label>昵称<input name="nickName" maxlength="30" placeholder="你的昵称"></label>
      <label>头像地址<input name="icon" placeholder="图片 URL 或 /imgs/..."></label>
      <label>城市<input name="city" maxlength="32" placeholder="所在城市"></label>
      <label>简介<textarea name="introduce" rows="4" maxlength="128" placeholder="介绍一下你的内容方向"></textarea></label>
      <div class="dialog-actions">
        <button class="ghost-button" value="cancel">取消</button>
        <button class="publish-button" value="default">保存</button>
      </div>
    </form>
  </dialog>

  <!-- 登录弹窗：本地调试使用验证码登录 -->
  <dialog class="login-dialog" id="loginDialog">
    <form method="dialog" class="login-form" id="loginForm">
      <div class="dialog-head">
        <h2>手机号登录</h2>
        <button class="icon-button" value="cancel" formnovalidate aria-label="关闭登录弹窗">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z"/></svg>
        </button>
      </div>
      <label>
        手机号
        <input name="phone" required placeholder="请输入手机号">
      </label>
      <div class="code-row">
        <label>
          验证码
          <input name="code" required placeholder="6 位验证码">
        </label>
        <button class="ghost-button" id="sendCodeButton" type="button">获取验证码</button>
      </div>
      <p class="login-tip">验证码会输出在后端日志里，适合本地调试。</p>
      <button class="wide-button" value="default">登录</button>
    </form>
  </dialog>

  <div class="toast-container" id="toastContainer"></div>

  <!-- JS modules (load order matters: utils first, then features, then app last) -->
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/notifications.js"></script>
  <script src="/assets/js/feed.js"></script>
  <script src="/assets/js/comments.js"></script>
  <script src="/assets/js/search.js"></script>
  <script src="/assets/js/customer-service.js"></script>
  <script src="/assets/js/mall.js"></script>
  <script src="/assets/js/video.js"></script>
  <script src="/assets/js/detail.js"></script>
  <script src="/assets/js/merchant.js"></script>
  <script src="/assets/js/composer.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
