server:
  port: 8081

spring:
  main:
    allow-circular-references: true
  application:
    name: hmdp
  ai:
    dashscope:
      api-key: "${DASHSCOPE_API_KEY:}"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${HMDP_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}"
    username: "${HMDP_DATASOURCE_USERNAME:root}"
    password: "${HMDP_DATASOURCE_PASSWORD:120402}"
  data:
    redis:
      host: "${HMDP_REDIS_HOST:192.168.19.130}"
      port: ${HMDP_REDIS_PORT:6379}
      password: "${HMDP_REDIS_PASSWORD:120402}"
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: debug

hmdp:
  storage:
    type: "${HMDP_STORAGE_TYPE:local}"
    oss:
      endpoint: "${HMDP_OSS_ENDPOINT:}"
      bucket: "${HMDP_OSS_BUCKET:}"
      access-key: "${HMDP_OSS_ACCESS_KEY:}"
      secret-key: "${HMDP_OSS_SECRET_KEY:}"
  upload:
    image-dir: "${HMDP_IMAGE_UPLOAD_DIR:D:/hmdp/nginx-1.18.0/html/hmdp/imgs}"
  ai:
    model: qwen-plus
    customer-service-temperature: 0.6
    query-temperature: 0.2
    max-tokens: 1500
    max-messages: 12
    knowledge-top-k: 3
