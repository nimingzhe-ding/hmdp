server:
  port: 8081

spring:
  application:
    name: hmdp
  ai:
    dashscope:
      api-key: {{DASHSCOPE_API_KEY}}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 120402
  data:
    redis:
      host: 192.168.19.130
      port: 6379
      password: REDIS_PASSWORD
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: debug

hmdp:
  ai:
    model: qwen-plus
    customer-service-temperature: 0.6
    query-temperature: 0.2
    max-tokens: 1500
    max-messages: 12
    knowledge-top-k: 3
